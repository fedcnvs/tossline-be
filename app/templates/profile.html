<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tossline — Profile</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="page-body">
  <header class="topbar">
    <span>Tossline</span>
    <span class="user-email">{{ user.email }}</span>
    <button id="logout-btn">Log out</button>
  </header>

  <main class="card">
    <h1>Profile</h1>

    <dl class="profile-list">
      <dt>Email</dt>
      <dd>{{ user.email }}</dd>

      <dt>Level</dt>
      <dd>{{ user.level }}</dd>

      <dt>Member since</dt>
      <dd>{{ user.created_at }}</dd>
    </dl>

    <a class="btn btn-secondary" href="/player">Go to player</a>
  </main>

  <script src="/static/js/player.js"></script>
</body>
</html>
