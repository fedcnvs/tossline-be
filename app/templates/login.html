<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tossline — Sign in</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <main class="card">
    <h1>Tossline</h1>

    <form id="email-form" class="form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com" />
      <button type="submit">Send login code</button>
    </form>

    <form id="pin-form" class="form hidden">
      <p class="hint">We sent a 6-digit code to <strong id="pin-email"></strong>.</p>
      <label for="pin">Login code</label>
      <input id="pin" name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code" />
      <button type="submit">Verify</button>
    </form>

    <p id="error" class="error hidden"></p>
  </main>

  <script src="/static/js/login.js"></script>
</body>
</html>
